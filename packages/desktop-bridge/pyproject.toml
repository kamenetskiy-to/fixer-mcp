[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fixer-desktop-bridge"
version = "0.1.0"
description = "Local read-oriented bridge for the first Fixer desktop app slice."
requires-python = ">=3.11"

[project.scripts]
fixer-desktop-bridge = "fixer_desktop_bridge.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
