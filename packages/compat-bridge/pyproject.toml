[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fixer-compat-bridge"
version = "0.1.0"
description = "Compatibility wrappers for migrating legacy Fixer MCP launcher usage into the GitHub-ready repo."
requires-python = ">=3.11"

[project.scripts]
fixer-compat-bridge = "fixer_compat_bridge.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
