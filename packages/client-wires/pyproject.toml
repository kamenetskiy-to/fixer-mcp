[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fixer-client-wires"
version = "0.1.0"
description = "Launcher packaging for the GitHub-ready Fixer MCP client wires package."
requires-python = ">=3.11"

[project.scripts]
fixer-client-wires = "fixer_client_wires.cli:main"
fixer = "fixer_client_wires.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
fixer_client_wires = [
  "data/*.json",
  "staged/config/*.json",
  "staged/examples/*.json",
  "staged/runtime/fixer_runtime/*.py",
  "staged/skills/*/SKILL.md",
]
